name: seoulfit_flutter
description: SeoulFit - AI-powered itinerary planner for foreign travelers in Seoul
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  google_fonts: ^6.1.0
  cupertino_icons: ^1.0.6
  kakao_map_plugin: ^0.4.0
  path_provider: ^2.1.0
  image_picker: ^1.1.0
  permission_handler: ^11.3.0
  url_launcher: ^6.3.0
  google_maps_flutter: ^2.9.0
  http: ^1.2.0
  google_generative_ai: ^0.4.0
  shimmer: ^3.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.14.1

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/images/seoulfit_mascot.png"

flutter:
  uses-material-design: true
  assets:
    - assets/images/